name: 서버 상태 확인

on:
  schedule:
    - cron: '*/5 * * * *'   # 5분마다 실행
  workflow_dispatch:          # 수동 실행 허용

jobs:
  health-check:
    runs-on: ubuntu-latest

    steps:
      - name: 서버 ping 및 상태 판단
        id: check
        run: |
          START_MS=$(date +%s%3N)

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            "https://jiugae-api-779661147142.asia-northeast3.run.app/" \
            2>/dev/null || echo "000")

          END_MS=$(date +%s%3N)
          ELAPSED=$((END_MS - START_MS))

          echo "HTTP: $HTTP_CODE  응답시간: ${ELAPSED}ms"

          if [ "$HTTP_CODE" = "000" ] || [ "$HTTP_CODE" -ge "500" ]; then
            echo "color=red"           >> $GITHUB_OUTPUT
            echo "message=🔴 오프라인"  >> $GITHUB_OUTPUT
          elif [ "$ELAPSED" -gt 3000 ]; then
            echo "color=orange"        >> $GITHUB_OUTPUT
            echo "message=🟡 응답 지연" >> $GITHUB_OUTPUT
          else
            echo "color=brightgreen"   >> $GITHUB_OUTPUT
            echo "message=🟢 정상"     >> $GITHUB_OUTPUT
          fi

      - name: Gist에 상태 업데이트
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
          STATUS_COLOR: ${{ steps.check.outputs.color }}
          STATUS_MESSAGE: ${{ steps.check.outputs.message }}
        run: |
          python3 - <<'EOF'
          import json, os, urllib.request

          payload = json.dumps({
              "schemaVersion": 1,
              "label": "API 서버",
              "message": os.environ["STATUS_MESSAGE"],
              "color": os.environ["STATUS_COLOR"],
              "cacheSeconds": 300,
          })

          body = json.dumps({
              "files": {"server-status.json": {"content": payload}}
          }).encode()

          req = urllib.request.Request(
              f"https://api.github.com/gists/{os.environ['GIST_ID']}",
              data=body,
              method="PATCH",
              headers={
                  "Authorization": f"token {os.environ['GIST_TOKEN']}",
                  "Accept": "application/vnd.github+json",
                  "Content-Type": "application/json",
              },
          )
          with urllib.request.urlopen(req) as r:
              print(f"Gist 업데이트 완료 (HTTP {r.status})")
          EOF
